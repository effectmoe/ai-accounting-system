 project: accounting-automation
  version: 1.0.0
  description: AI Accounting Automation System

  agents:
    - name: accounting-agent
      description: 会計処理エージェント
      file: ./src/mastra/agents/mastra-accounting-agent.ts
    - name: customer-agent
      description: 顧客管理エージェント
      file: ./src/mastra/agents/mastra-customer-agent.ts
    - name: database-agent
      description: DB操作エージェント
      file: ./src/mastra/agents/mastra-database-agent.ts
    - name: japan-tax-agent
      description: 日本税制エージェント
      file: ./src/mastra/agents/mastra-japan-tax-agent.ts
    - name: ocr-agent
      description: OCRエージェント
      file: ./src/mastra/agents/mastra-ocr-agent.ts
    - name: product-agent
      description: 商品管理エージェント
      file: ./src/mastra/agents/mastra-product-agent.ts
    - name: ui-agent
      description: UIエージェント
      file: ./src/mastra/agents/mastra-ui-agent.ts

  workflows:
    - name: accounting-workflow
      file: ./src/mastra/workflows/accounting-workflow.ts

  tools:
    - name: accounting-tools
      file: ./src/mastra/tools/accounting-tools.ts
    - name: customer-tools
      file: ./src/mastra/tools/customer-tools.ts
    - name: database-tools
      file: ./src/mastra/tools/database-tools.ts
    - name: japan-tax-tools
      file: ./src/mastra/tools/japan-tax-tools.ts
    - name: ocr-tools
      file: ./src/mastra/tools/ocr-tools.ts

  environment:
    MONGODB_URI: ${MONGODB_URI}
    DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
    AZURE_FORM_RECOGNIZER_ENDPOINT: ${AZURE_FORM_RECOGNIZER_ENDPOINT}
    AZURE_FORM_RECOGNIZER_KEY: ${AZURE_FORM_RECOGNIZER_KEY}

